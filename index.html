<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天眼查线索字段匹配工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }
.container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
.header { margin-bottom: 2rem; }
.header h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; }
.header p { font-size: 13px; color: #888; margin-top: 4px; }
.card { background: #fff; border-radius: 12px; border: 0.5px solid #e5e5e0; padding: 1.5rem; margin-bottom: 1rem; }
.section-label { font-size: 11px; font-weight: 500; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
input[type=text], input[type=date] { width: 100%; padding: 9px 12px; font-size: 13px; border: 0.5px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; font-family: inherit; }
input:focus { outline: none; border-color: #999; }
textarea { width: 100%; min-height: 120px; padding: 12px; font-size: 13px; border: 0.5px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; resize: vertical; font-family: inherit; line-height: 1.6; }
textarea:focus { outline: none; border-color: #999; }
.btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
button { padding: 8px 18px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 0.5px solid #ddd; background: #fff; color: #1a1a1a; cursor: pointer; font-family: inherit; }
button:hover { background: #f5f5f0; }
button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
button.primary:hover { background: #333; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat-card { background: #f5f5f0; border-radius: 8px; padding: 12px; }
.stat-card .num { font-size: 24px; font-weight: 500; }
.stat-card .lbl { font-size: 12px; color: #888; margin-top: 2px; }
.table-wrap { border: 0.5px solid #e5e5e0; border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { background: #f9f9f7; font-weight: 500; font-size: 11px; color: #888; padding: 9px 12px; text-align: left; border-bottom: 0.5px solid #e5e5e0; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 0.5px solid #f0f0ec; color: #1a1a1a; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf8; }
select { padding: 4px 6px; font-size: 12px; border: 0.5px solid #ddd; border-radius: 6px; background: #fff; color: #1a1a1a; font-family: inherit; }
.pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.pill-win { background: #e8f5e9; color: #2e7d32; }
.pill-tie { background: #f5f5f0; color: #666; }
.pill-lose { background: #ffebee; color: #c62828; }
.banner { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
.banner.success { background: #e8f5e9; color: #2e7d32; display: block; }
.hint { font-size: 12px; color: #999; margin-top: 8px; line-height: 1.6; }
.empty { padding: 3rem; text-align: center; color: #bbb; font-size: 14px; }
.loading { padding: 2rem; text-align: center; color: #888; font-size: 14px; }
.filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-row label { font-size: 12px; color: #888; }
.type-tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; margin-bottom: 14px; font-weight: 500; }
.type-person { background: #e8f0fe; color: #1a5276; }
.type-company { background: #e8f5e9; color: #1b5e20; }
.type-legal { background: #fff3e0; color: #7f4800; }
.type-finance { background: #fce4ec; color: #7b1fa2; }
@media (max-width: 600px) {
  .input-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>线索字段匹配工具</h1>
    <p>输入线索内容，自动匹配涉及的天眼查数据字段，评估与企查查的竞争力</p>
  </div>
  <div class="card">
    <div class="input-grid">
      <div>
        <div class="section-label">日期</div>
        <input type="date" id="input-date" />
      </div>
      <div>
        <div class="section-label">涉及公司/人物</div>
        <input type="text" id="input-company" placeholder="如 宁德时代 / 张天爱" />
      </div>
    </div>
    <div class="section-label">线索内容</div>
    <textarea id="clue-input" placeholder="粘贴线索原文…"></textarea>
    <div class="btn-row">
      <button class="primary" id="match-btn" onclick="runMatch()">匹配字段</button>
      <button onclick="loadExample('company')">示例：企业线索</button>
      <button onclick="loadExample('person')">示例：人物线索</button>
      <button onclick="clearAll()">清空</button>
    </div>
  </div>
  <div id="results-area"></div>
</div>

  {id:"D00784", name:"抽查检查结果", table:"抽查检查-市场监管", type:"legal",
   kw:["抽查检查","被抽查","市场监管.*检查","监督检查"]},
  {id:"D00791", name:"抽查计划编号", table:"双随机抽查", type:"legal",
   kw:["双随机抽查","双随机"]},

  // ══ 股权穿透 ══
  {id:"D02689", name:"股东名称", table:"股权穿透表", type:"company",
   kw:["股权全景","股权穿透图","穿透.*股东"]},

  // ══ 产业链 ══
  {id:"D06981", name:"产业链节点名称", table:"产业链信息表", type:"company",
   kw:["机器人产业","新能源汽车换电","半导体投资","芯片产业","产业链"]},

  // ══ 企业名称 ══
  {id:"D02422", name:"企业名称", table:"普通企业工商信息表", type:"company",
   kw:["完成更名","更名为","名称由.*变更","企业名称变更"]},
];

const EXAMPLES = {
  company: {
    date: new Date().toISOString().slice(0,10),
    company: "宁德时代",
    text: "【#宁德时代在泰州成立新科技公司# 注册资本500万】天眼查App显示，近日，时代骐骥新能源科技（泰州）有限公司成立，法定代表人为宋庆龙，注册资本500万人民币，经营范围包括新能源技术研发、新能源汽车换电设施销售等，由宁德时代（300750）旗下时代骐骥新能源科技（苏州）有限公司全资持股。"
  },
  person: {
    date: new Date().toISOString().slice(0,10),
    company: "张天爱",
    text: "【#张天爱真名张娇# #张天爱与张寓帅无商业关联#】天眼查App显示，张娇（张天爱）名下关联7家企业，其中3家处于存续状态，包括天津美欣企业管理有限公司、海南禧果文化传媒工作室等，张娇（张天爱）在上述企业担任执行董事、经理等职务。查关系信息显示，张娇（张天爱）与张寓帅无直接商业关联。"
  }
};

let matchedData = [];
let meta = {date:'', company:'', content:''};

function loadExample(type) {
  const e = EXAMPLES[type];
  document.getElementById('input-date').value = e.date;
  document.getElementById('input-company').value = e.company;
  document.getElementById('clue-input').value = e.text;
}

function clearAll() {
  document.getElementById('input-date').value = '';
  document.getElementById('input-company').value = '';
  document.getElementById('clue-input').value = '';
  document.getElementById('results-area').innerHTML = '';
  matchedData = [];
}

const TYPE_LABELS = {
  person:  {text:'人物线索', cls:'type-person'},
  company: {text:'企业线索', cls:'type-company'},
  legal:   {text:'法律诉讼', cls:'type-legal'},
  finance: {text:'融资财务', cls:'type-finance'},
};

function detectMainType(data) {
  const counts = {};
  data.forEach(d => { counts[d.type] = (counts[d.type]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'company';
}

function matchFields(text) {
  const seen = new Set();
  const results = [];
  for (const f of FIELD_DB) {
    const key = f.id + '|' + f.table;
    if (seen.has(key)) continue;
    const hit = f.kw.some(kw => {
      try { return new RegExp(kw).test(text); }
      catch(e) { return text.includes(kw); }
    });
    if (hit) {
      seen.add(key);
      results.push({...f, qcc:'', judge:''});
    }
  }
  return results;
}

function runMatch() {
  const text = document.getElementById('clue-input').value.trim();
  if (!text) { alert('请先输入线索内容'); return; }
  meta.date = document.getElementById('input-date').value;
  meta.company = document.getElementById('input-company').value;
  meta.content = text;
  const btn = document.getElementById('match-btn');
  btn.disabled = true; btn.textContent = '匹配中…';
  document.getElementById('results-area').innerHTML = '<div class="card loading">正在分析线索，匹配字段中…</div>';
  setTimeout(() => {
    matchedData = matchFields(text);
    renderResults();
    btn.disabled = false; btn.textContent = '匹配字段';
  }, 400);
}

function renderResults() {
  const area = document.getElementById('results-area');
  if (!matchedData.length) {
    area.innerHTML = '<div class="card empty">未匹配到相关字段，请检查线索内容</div>';
    return;
  }
  const tables = [...new Set(matchedData.map(d => d.table))];
  const tl = TYPE_LABELS[detectMainType(matchedData)] || TYPE_LABELS.company;
  let html = '<div class="card">';
  html += `<span class="type-tag ${tl.cls}">${tl.text}</span>`;
  html += '<div class="stats-row">';
  html += `<div class="stat-card"><div class="num">${matchedData.length}</div><div class="lbl">匹配字段数</div></div>`;
  html += `<div class="stat-card"><div class="num">${tables.length}</div><div class="lbl">涉及数据表</div></div>`;
  html += `<div class="stat-card"><div class="num" id="win-num">0</div><div class="lbl">TYC优</div></div>`;
  html += `<div class="stat-card"><div class="num" id="pending-num">${matchedData.length}</div><div class="lbl">待评估</div></div>`;
  html += '</div>';
  html += '<div class="filter-row"><label>筛选数据表：</label>';
  html += '<select id="table-filter" onchange="filterTable()"><option value="">全部</option>';
  tables.forEach(t => { html += `<option value="${t}">${t}</option>`; });
  html += '</select></div>';
  html += '<div class="table-wrap"><table>';
  html += '<colgroup><col style="width:130px"><col style="width:90px"><col><col style="width:150px"><col style="width:95px"><col style="width:95px"><col style="width:85px"></colgroup>';
  html += '<thead><tr><th>涉及公司</th><th>字段ID</th><th>所属数据表</th><th>文档字段名称</th><th style="text-align:center">天眼查</th><th style="text-align:center">企查查</th><th style="text-align:center">竞争力</th></tr></thead>';
  html += '<tbody id="result-tbody">';
  matchedData.forEach((row, i) => {
    html += `<tr data-table="${row.table}">`;
    html += `<td style="font-size:12px;color:#555;">${meta.company||'—'}</td>`;
    html += `<td style="font-family:monospace;font-size:11px;color:#aaa;">${row.id}</td>`;
    html += `<td style="font-size:12px;color:#888;">${row.table}</td>`;
    html += `<td style="font-weight:500;">${row.name}</td>`;
    html += `<td style="text-align:center;"><select onchange="updateTyc(${i},this.value)"><option value="">待评估</option><option value="有">✅ 有</option><option value="无">❌ 无</option></select></td>`;
    html += `<td style="text-align:center;"><select onchange="updateQcc(${i},this.value)"><option value="">待评估</option><option value="有">✅ 有</option><option value="无">❌ 无</option></select></td>`;
    html += `<td style="text-align:center;" id="j-${i}"><span style="color:#ddd;">—</span></td>`;
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  html += '<div class="btn-row" style="margin-top:16px;"><button class="primary" onclick="copyToFeishu()">复制到飞书</button></div>';
  html += '<div class="hint">复制后在飞书多维表格选中第一个空行，直接 Ctrl+V 粘贴。列顺序：涉及公司 / 字段ID / 所属数据表 / 文档字段名称 / 天眼查 / 企查查 / 竞争力</div>';
  html += '<div class="banner" id="copy-banner">已复制！请在飞书多维表格中粘贴（Ctrl+V）</div>';
  html += '</div>';
  area.innerHTML = html;
}

function updateTyc(i, val) {
  matchedData[i].tyc = val;
  calcJudge(i);
}

function updateQcc(i, val) {
  matchedData[i].qcc = val;
  calcJudge(i);
}

function calcJudge(i) {
  const tyc = matchedData[i].tyc || '';
  const qcc = matchedData[i].qcc || '';
  let judge = '', html = '';
  if (tyc === '有' && qcc === '无') { judge = 'TYC优'; html = '<span class="pill pill-win">TYC优</span>'; }
  else if (tyc === '有' && qcc === '有') { judge = '平'; html = '<span class="pill pill-tie">平</span>'; }
  else if (tyc === '无' && qcc === '有') { judge = 'QCC优'; html = '<span class="pill pill-lose">QCC优</span>'; }
  else if (tyc === '无' && qcc === '无') { judge = '均无'; html = '<span style="color:#bbb;font-size:11px;">均无</span>'; }
  else { html = '<span style="color:#ddd;">—</span>'; }
  matchedData[i].judge = judge;
  document.getElementById('j-'+i).innerHTML = html;
  document.getElementById('win-num').textContent = matchedData.filter(d=>d.judge==='TYC优').length;
  document.getElementById('pending-num').textContent = matchedData.filter(d=>!d.tyc||!d.qcc).length;
}

function filterTable() {
  const val = document.getElementById('table-filter').value;
  document.querySelectorAll('#result-tbody tr').forEach(row => {
    row.style.display = (!val || row.dataset.table === val) ? '' : 'none';
  });
}

function copyToFeishu() {
  const rows = matchedData.map(d => [
    meta.company, d.id, d.table, d.name,
    d.tyc||'待评估', d.qcc||'待评估', d.judge||'待评估'
  ].join('\t')).join('\n');
  navigator.clipboard.writeText(rows).then(() => {
    const b = document.getElementById('copy-banner');
    b.classList.add('success');
    setTimeout(() => b.classList.remove('success'), 3000);
  }).catch(() => alert('复制失败，请检查浏览器权限'));
}
</script>
</body>
</html>
